# Nome da aplicação no ecossistema Spring
spring.application.name=ToDoList

# Define o driver JDBC do MySQL para a conexão
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# URL de conexão com o banco de dados (Protocolo:Banco://Host:Porta/Schema)
spring.datasource.url=jdbc:mysql://localhost:3306/todolist?createDatabaseIfNotExist=true

# Credenciais de acesso ao banco de dados
spring.datasource.username=root
spring.datasource.password=

# Exibe os comandos SQL gerados no console para depuração
spring.jpa.show-sql=true

# Estratégia de gestão do esquema do banco (Cria/Atualiza tabelas)
spring.jpa.hibernate.ddl-auto=update

# Chave secreta para assinatura de tokens (Usa variável de ambiente ou valor padrão)
api.security.token.secret=${JWT_SECRET:chave-padrao-de-teste}